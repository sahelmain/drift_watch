databases:
  - name: driftwatch-db-free
    plan: free
    databaseName: driftwatch
    user: driftwatch
    ipAllowList: []

services:
  - type: web
    name: driftwatch-api-free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: driftwatch-db-free
          property: connectionString
      - key: AUTO_CREATE_SCHEMA
        value: "true"
      - key: ENABLE_INLINE_SCHEDULER
        value: "false"
      - key: CORS_ORIGINS
        value: '["http://localhost:3000","http://localhost:5173","https://driftwatch.vercel.app","https://driftwatch-eight.vercel.app"]'
      - key: ENVIRONMENT
        value: production
