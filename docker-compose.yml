version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: driftwatch-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://driftwatch:driftwatch@db:5432/driftwatch
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - driftwatch-net
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: driftwatch-worker
    command: celery -A worker.runner.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://driftwatch:driftwatch@db:5432/driftwatch
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - driftwatch-net
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: driftwatch-scheduler
    command: celery -A worker.runner.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://driftwatch:driftwatch@db:5432/driftwatch
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - driftwatch-net
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: driftwatch-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: driftwatch
      POSTGRES_PASSWORD: driftwatch
      POSTGRES_DB: driftwatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driftwatch -d driftwatch"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - driftwatch-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: driftwatch-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - driftwatch-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: driftwatch-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - driftwatch-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: driftwatch-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - driftwatch-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: driftwatch-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - driftwatch-net
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  grafana_data:
    driver: local

networks:
  driftwatch-net:
    driver: bridge
