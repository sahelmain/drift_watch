apiVersion: apps/v1
kind: Deployment
metadata:
  name: driftwatch-worker
  namespace: driftwatch
  labels:
    app.kubernetes.io/name: driftwatch-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: driftwatch
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: driftwatch-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: driftwatch-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: driftwatch
    spec:
      containers:
        - name: worker
          image: ghcr.io/driftwatch/api:latest
          command: ["celery", "-A", "worker.runner.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
          envFrom:
            - configMapRef:
                name: driftwatch-config
            - secretRef:
                name: driftwatch-secrets
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
      restartPolicy: Always
