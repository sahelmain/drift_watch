apiVersion: apps/v1
kind: Deployment
metadata:
  name: driftwatch-api
  namespace: driftwatch
  labels:
    app.kubernetes.io/name: driftwatch-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: driftwatch
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: driftwatch-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: driftwatch-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: driftwatch
    spec:
      containers:
        - name: api
          image: ghcr.io/driftwatch/api:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: driftwatch-config
            - secretRef:
                name: driftwatch-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: driftwatch-api
  namespace: driftwatch
  labels:
    app.kubernetes.io/name: driftwatch-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: driftwatch
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: driftwatch-api
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: driftwatch-api
  namespace: driftwatch
  labels:
    app.kubernetes.io/name: driftwatch-api
    app.kubernetes.io/part-of: driftwatch
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: driftwatch-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
