apiVersion: v1
kind: ConfigMap
metadata:
  name: driftwatch-config
  namespace: driftwatch
  labels:
    app.kubernetes.io/name: driftwatch-config
    app.kubernetes.io/part-of: driftwatch
data:
  DATABASE_URL: "postgresql+asyncpg://driftwatch:REPLACE_PASSWORD@driftwatch-db:5432/driftwatch"
  REDIS_URL: "redis://driftwatch-redis:6379/0"
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  CORS_ORIGINS: "https://driftwatch.example.com"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  CELERY_BROKER_URL: "redis://driftwatch-redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://driftwatch-redis:6379/1"
