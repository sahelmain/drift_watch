global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "driftwatch-api"
    metrics_path: /api/metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "driftwatch-api"
